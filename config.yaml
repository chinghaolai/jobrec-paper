# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "Howard"
repo_name: "Job-recommendation-paper-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 500

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "Job Recommendation":
        filters: ["Job Recommendation", "Job Recommender", "Job recommendations"]
    "Talent Recommendation":
        filters: ["Talent Recommendation", "Talent Recommender", "Candidate Recommendation"]
    "Person-Job Fit":
        filters: ["Person-Job Fit", "Person-Job Matching", "Talent-Job Matching", "Resume-Job Matching", "Job Matching"]
